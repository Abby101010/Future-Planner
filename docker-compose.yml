# NorthStar — PostgreSQL + Adminer (for DB management UI)
#
# Usage:
#   docker compose up -d        # Start Adminer on http://localhost:8080
#   docker compose down         # Stop
#
# PostgreSQL runs natively on your Mac (not via Docker).
# Adminer connects to your local PG via host.docker.internal.

services:
  adminer:
    image: adminer:4.8.1
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: host.docker.internal
      ADMINER_DESIGN: nette
