<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#7fa8e8"/>
      <stop offset="50%" stop-color="#c8b9e8"/>
      <stop offset="100%" stop-color="#f0c9a0"/>
    </linearGradient>

    <linearGradient id="bgOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="starFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fdf6ec"/>
    </linearGradient>

    <linearGradient id="starStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#6b95d8"/>
      <stop offset="100%" stop-color="#e0a878"/>
    </linearGradient>

    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="0" dy="14" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bgOverlay)"/>

  <rect x="20" y="20" width="984" height="984" rx="208" ry="208"
        fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="6"/>

  <circle cx="512" cy="512" r="380" fill="url(#halo)"/>

  <g filter="url(#softShadow)">
    <path d="M 512 512 L 736 288 L 608 416 Z
             M 512 512 L 736 736 L 608 608 Z
             M 512 512 L 288 736 L 416 608 Z
             M 512 512 L 288 288 L 416 416 Z"
          fill="#ffffff" opacity="0.7"/>

    <path d="M 512 96
             L 564 476
             L 928 512
             L 564 548
             L 512 928
             L 460 548
             L 96 512
             L 460 476 Z"
          fill="url(#starFill)"
          stroke="url(#starStroke)"
          stroke-width="14"
          stroke-linejoin="round"/>

    <circle cx="512" cy="512" r="38" fill="#ffffff"/>
    <circle cx="512" cy="512" r="22" fill="url(#starStroke)"/>
  </g>

  <g fill="#ffffff">
    <circle cx="820" cy="230" r="9" opacity="0.95"/>
    <circle cx="230" cy="820" r="7" opacity="0.9"/>
    <circle cx="840" cy="770" r="6" opacity="0.85"/>
    <circle cx="200" cy="260" r="6" opacity="0.85"/>
    <circle cx="760" cy="870" r="4" opacity="0.8"/>
    <circle cx="280" cy="170" r="4" opacity="0.8"/>
  </g>
</svg>
