# ──────────────────────────────────────────────────────────────
# Release workflow — builds macOS .dmg, Windows .exe (NSIS),
# and Linux .AppImage, then uploads them to a GitHub Release.
#
# Trigger: push a semver tag, e.g.  git tag v0.1.0 && git push --tags
# ──────────────────────────────────────────────────────────────
name: Build & Release

on:
  push:
    tags:
      - "v*"

# Need write permission to create releases & upload assets
permissions:
  contents: write

jobs:
  # ─── macOS (.dmg, universal binary) ───────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install at root with explicit --include=optional so
      # app-builder-bin's per-platform binary subdirs (mac/, linux/,
      # win/) materialize under the hoisted node_modules/. Workspaces
      # hoist + missing optional deps is the documented cause of the
      # "spawn .../app-builder-bin/mac/app-builder_arm64 ENOENT"
      # failure mode; `npm rebuild` re-runs install scripts to
      # re-populate any binaries that npm ci skipped.
      - name: Install dependencies
        run: |
          npm ci --include=optional
          npm rebuild app-builder-bin || true

      # Build the @starward/core workspace first. The frontend imports
      # from `@starward/core` (types + handlers); the symlink resolves
      # to backend/core/, whose package.json `main`/`exports` points
      # at `dist/`. Without this step, frontend `tsc` fails with
      # "Cannot find module '@starward/core'". Mirrors the Dockerfile
      # build chain used by `Deploy backend to Fly`.
      - name: Build @starward/core
        run: npm --workspace @starward/core run build

      # Build runs from frontend/ — the desktop workspace is where the
      # vite + electron build script lives. The root package.json has
      # no `build` script (intentional — the monorepo build is per
      # workspace), so `npm run build` from root would fail with
      # "Missing script: build". Same reasoning applies to the
      # electron-builder step: its config is in frontend/package.json
      # `build` field, paths inside use frontend/-relative roots
      # (build/icon.icns etc.), so it must run from frontend/.
      - name: Build Vite + Electron (macOS)
        working-directory: frontend
        run: npm run build
        env:
          CI: true
          VITE_CLOUD_API_URL: https://northstar-api.fly.dev
          VITE_SUPABASE_URL: https://fgrufbpmvvbhkrefwulk.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZncnVmYnBtdnZiaGtyZWZ3dWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3OTg3MjEsImV4cCI6MjA5MTM3NDcyMX0.LTb1Jrj-WOMAMM81h_Qxsf04TXwkLAQDiqaLlF49MHw

      - name: Package with electron-builder (macOS .dmg)
        working-directory: frontend
        run: npx electron-builder --mac --universal --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            frontend/release/*.dmg
            frontend/release/latest-mac.yml

  # ─── Windows (.exe via NSIS) ──────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install at root with explicit --include=optional so
      # app-builder-bin's per-platform binary subdirs (mac/, linux/,
      # win/) materialize under the hoisted node_modules/. Workspaces
      # hoist + missing optional deps is the documented cause of the
      # "spawn .../app-builder-bin/mac/app-builder_arm64 ENOENT"
      # failure mode; `npm rebuild` re-runs install scripts to
      # re-populate any binaries that npm ci skipped.
      - name: Install dependencies
        run: |
          npm ci --include=optional
          npm rebuild app-builder-bin || true

      # Build the @starward/core workspace first. The frontend imports
      # from `@starward/core` (types + handlers); the symlink resolves
      # to backend/core/, whose package.json `main`/`exports` points
      # at `dist/`. Without this step, frontend `tsc` fails with
      # "Cannot find module '@starward/core'". Mirrors the Dockerfile
      # build chain used by `Deploy backend to Fly`.
      - name: Build @starward/core
        run: npm --workspace @starward/core run build

      - name: Build Vite + Electron (Windows)
        working-directory: frontend
        run: npm run build
        env:
          CI: true
          VITE_CLOUD_API_URL: https://northstar-api.fly.dev
          VITE_SUPABASE_URL: https://fgrufbpmvvbhkrefwulk.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZncnVmYnBtdnZiaGtyZWZ3dWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3OTg3MjEsImV4cCI6MjA5MTM3NDcyMX0.LTb1Jrj-WOMAMM81h_Qxsf04TXwkLAQDiqaLlF49MHw

      - name: Package with electron-builder (Windows NSIS)
        working-directory: frontend
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            frontend/release/*.exe
            frontend/release/latest.yml

  # ─── Linux (.AppImage) ───────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install at root with explicit --include=optional so
      # app-builder-bin's per-platform binary subdirs (mac/, linux/,
      # win/) materialize under the hoisted node_modules/. Workspaces
      # hoist + missing optional deps is the documented cause of the
      # "spawn .../app-builder-bin/mac/app-builder_arm64 ENOENT"
      # failure mode; `npm rebuild` re-runs install scripts to
      # re-populate any binaries that npm ci skipped.
      - name: Install dependencies
        run: |
          npm ci --include=optional
          npm rebuild app-builder-bin || true

      # Build the @starward/core workspace first. The frontend imports
      # from `@starward/core` (types + handlers); the symlink resolves
      # to backend/core/, whose package.json `main`/`exports` points
      # at `dist/`. Without this step, frontend `tsc` fails with
      # "Cannot find module '@starward/core'". Mirrors the Dockerfile
      # build chain used by `Deploy backend to Fly`.
      - name: Build @starward/core
        run: npm --workspace @starward/core run build

      - name: Build Vite + Electron (Linux)
        working-directory: frontend
        run: npm run build
        env:
          CI: true
          VITE_CLOUD_API_URL: https://northstar-api.fly.dev
          VITE_SUPABASE_URL: https://fgrufbpmvvbhkrefwulk.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZncnVmYnBtdnZiaGtyZWZ3dWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3OTg3MjEsImV4cCI6MjA5MTM3NDcyMX0.LTb1Jrj-WOMAMM81h_Qxsf04TXwkLAQDiqaLlF49MHw

      - name: Package with electron-builder (Linux AppImage)
        working-directory: frontend
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            frontend/release/*.AppImage
            frontend/release/latest-linux.yml

  # ─── Promote draft release to published ─────────────────
  # electron-builder uploads each platform's artifacts (including the
  # `latest-*.yml` metadata files that electron-updater needs) to a
  # *draft* GitHub Release. We promote it to published here so the
  # auto-updater can actually see it.
  promote-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Promote draft release for ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release edit "${{ github.ref_name }}" --draft=false --prerelease=false
