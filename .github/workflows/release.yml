# ──────────────────────────────────────────────────────────────
# Release workflow — builds macOS .dmg, Windows .exe (NSIS),
# and Linux .AppImage, then uploads them to a GitHub Release.
#
# Trigger: push a semver tag, e.g.  git tag v0.1.0 && git push --tags
# ──────────────────────────────────────────────────────────────
name: Build & Release

on:
  push:
    tags:
      - "v*"

# Need write permission to create releases & upload assets
permissions:
  contents: write

jobs:
  # ─── macOS (.dmg, universal binary) ───────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite + Electron (macOS)
        run: npm run build
        env:
          CI: true

      - name: Package with electron-builder (macOS .dmg)
        run: npx electron-builder --mac --universal --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            release/*.dmg
            release/latest-mac.yml

  # ─── Windows (.exe via NSIS) ──────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite + Electron (Windows)
        run: npm run build
        env:
          CI: true

      - name: Package with electron-builder (Windows NSIS)
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/*.exe
            release/latest.yml

  # ─── Linux (.AppImage) ───────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite + Electron (Linux)
        run: npm run build
        env:
          CI: true

      - name: Package with electron-builder (Linux AppImage)
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            release/*.AppImage
            release/latest-linux.yml

  # ─── Promote draft release to published ─────────────────
  # electron-builder uploads each platform's artifacts (including the
  # `latest-*.yml` metadata files that electron-updater needs) to a
  # *draft* GitHub Release. We promote it to published here so the
  # auto-updater can actually see it.
  promote-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Promote draft release for ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release edit "${{ github.ref_name }}" --draft=false --prerelease=false
