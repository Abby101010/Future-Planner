# ──────────────────────────────────────────────────────────────
# Backend auto-deploy — pushes the Fly app on every commit to
# main that touches backend/. Skips runs that only change
# frontend/, docs, or other unrelated paths.
#
# Required repo secret: FLY_API_TOKEN
#   Create one with:  fly tokens create deploy -a starward-api
#   Then add it under: Settings → Secrets and variables → Actions
# ──────────────────────────────────────────────────────────────
name: Deploy backend to Fly

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: # allow manual trigger from the Actions tab

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    name: flyctl deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # fly.toml lives at repo root (it references backend/Dockerfile and
      # needs backend/ + backend/core/ in the build context). flyctl must
      # run from the repo root so it can find fly.toml — the old
      # `working-directory: backend` broke every deploy after the
      # monorepo split with "missing an app name" because flyctl
      # couldn't see the root fly.toml.
      - name: Deploy to Fly
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
